<!doctype html>
<html lang="uk">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ODD Invest</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<!--
  Хост веб-версії. Уся розмітка й логіка — у <odd-invest-app> (js/app.js),
  тому самому компоненті, який монтує панель Home Assistant. Тут лишається
  рівно те, чим ці дві поверхні відрізняються: транспорт до бекенда й тема.

  До цього тут жила друга, незалежна реалізація того самого UI на півтори
  тисячі рядків. Вона неминуче відставала від панелі — і відставала:
  календар був мертвою таблицею без статусів виплат, а вивід не
  екранувався. Одне джерело прибирає і те, і те.
-->
<style>
  /* Фон сторінки — до того, як компонент одягнеться: інакше на перший
     кадр блимає біле. Далі тло малює вже сам :host. */
  html, body { margin: 0; min-height: 100%; background: #111418; }
</style>
</head>
<body>
<odd-invest-app></odd-invest-app>
<script type="module">
  import { httpTransport } from "./js/transport.js";
  import "./js/app.js";

  const app = document.querySelector("odd-invest-app");
  app.theme = "web";
  app.transport = httpTransport();
</script>
</body>
</html>
