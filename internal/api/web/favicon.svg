<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!--
    Знак ODD Invest в оправі — версія для вкладки браузера.

    Той самий мотив, що й у шапці (три квадрати сходами), але в рамці:
    голий знак на 16 пікселях тоне серед інших фавіконів, а рамка дає
    йому власну масу й межу.

    Колір зашитий навмисно. Фавікон малюється поза сторінкою, там немає
    ані currentColor, ані наших токенів; #4da3ff читається і на світлій
    смузі вкладок, і на темній.
  -->
  <title>ODD Invest</title>
  <rect x="1.5" y="1.5" width="21" height="21" rx="6.5" fill="none" stroke="#4da3ff" stroke-width="1.9"/>
  <g fill="#4da3ff">
    <rect x="5.6" y="13.8" width="4.8" height="4.8" rx="1.3"/>
    <rect x="9.6" y="9.6" width="4.8" height="4.8" rx="1.3"/>
    <rect x="13.6" y="5.4" width="4.8" height="4.8" rx="1.3"/>
  </g>
</svg>
